services:
  traj-generator:
    build:
      context: .
      dockerfile: Dockerfile
    image: traj-generator:latest
    gpus: all
    volumes:
      - ./config.json:/app/config.json:ro
      - ./output:/app/output
      - ./hf-cache:/root/.cache/huggingface
    environment:
      - HF_HOME=/root/.cache/huggingface
    command: ["uv", "run", "python", "/app/scripts/generator_cli.py", "--output-dir", "/app/output", "--num-prompts", "8", "--trajectories-per-prompt", "4", "--num-shards", "2"]
